<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netiva — Fresh from the source</title>
  <style>
    /* Reset & base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Serif+Display:ital@0;1&family=Noto+Serif+SC:wght@400;600&display=swap');
    :root {
      --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-serif: 'DM Serif Display', 'Noto Serif SC', Georgia, serif;
      --font-mono: 'SF Mono', 'Fira Code', monospace;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #6b6b6b;
      --color-text-tertiary: #a8a8a8;
      --color-background-primary: #f4f4f2;
      --color-background-secondary: #ebebea;
      --color-border-primary: #c8c8c8;
      --color-border-secondary: #d8d8d8;
      --color-border-tertiary: #e4e4e4;
      --color-accent: #3d3d9e;
      --color-accent-light: #eaeaf5;
      /* Colour splashes */
      --splash-cobalt: #3d3d9e;
      --splash-cobalt-light: #eaeaf5;
      --splash-sage: #3a7d5c;
      --splash-sage-light: #e8f3ed;
      --splash-plum: #7b3fa0;
      --splash-plum-light: #f3ecf8;
      --splash-sand: #c4934e;
      --splash-sand-light: #f8f0e3;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }
    body { font-family: var(--font-sans); color: var(--color-text-primary); font-size: 14px; background: var(--color-background-primary); }
    input, select, textarea, button { font-family: var(--font-sans); font-size: 13px; outline: none; }
    input, select, textarea { border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 7px 10px; background: var(--color-background-primary); color: var(--color-text-primary); }
    input:focus, select:focus, textarea:focus { border-color: var(--color-border-primary); }

    .nav { display: flex; align-items: center; justify-content: space-between; padding: .875rem 1.5rem; border-bottom: 1px solid var(--color-border-tertiary); background: rgba(244,244,242,0.96); backdrop-filter: blur(10px); gap: 8px; position: sticky; top: 0; z-index: 50; transition: background .3s, border-color .3s; }
    .nav.nav-hero { position: fixed; width: 100%; background: transparent; border-bottom-color: transparent; backdrop-filter: none; }
    .logo { font-size: 20px; font-weight: 400; cursor: pointer; letter-spacing: -.3px; flex-shrink: 0; color: var(--color-text-primary); transition: color .3s; font-family: var(--font-serif); font-style: italic; }
    .nav.nav-hero .logo { color: rgba(248,245,238,0.95); }
    .nav-c { display: flex; gap: 1.5rem; }
    .nav-c a { font-size: 13px; color: var(--color-text-secondary); cursor: pointer; text-decoration: none; }
    .nav-c a:hover { color: var(--color-text-primary); }
    .nav-r { display: flex; align-items: center; gap: 8px; }
    .rate-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; background: var(--color-background-secondary); border: .5px solid var(--color-border-secondary); border-radius: 999px; padding: 3px 10px; color: var(--color-text-secondary); transition: background .3s, border-color .3s, color .3s; }
    .nav.nav-hero .rate-chip { background: rgba(248,245,238,0.1); border-color: rgba(248,245,238,0.25); color: rgba(248,245,238,0.88); }
    .nav.nav-hero .rate-dot { background: rgba(248,245,238,0.45); }
    .nav.nav-hero .rate-dot.live { background: #9de86a; }
    .nav.nav-hero .nav-link-btn, .nav.nav-hero .lang-dd-btn, .nav.nav-hero #nav-shop, .nav.nav-hero #nav-admin, .nav.nav-hero #lang-label { color: rgba(248,245,238,0.88); }
    .nav.nav-hero .nav-link-btn:hover, .nav.nav-hero .lang-dd-btn:hover, .nav.nav-hero #nav-shop:hover, .nav.nav-hero #nav-admin:hover { color: #fff; }
    .nav.nav-hero .btn { color: rgba(248,245,238,0.88); border-color: rgba(248,245,238,0.3); background: rgba(248,245,238,0.08); }
    .nav.nav-hero .btn:hover { background: rgba(248,245,238,0.16); border-color: rgba(248,245,238,0.5); color: #fff; }
    .nav.nav-hero .btn.p { background: rgba(248,245,238,0.92); color: #1c1a16; border-color: transparent; }
    .nav.nav-hero .btn.p:hover { background: #fff; }
    .nav.nav-hero .mob-menu-btn { color: rgba(248,245,238,0.88); border-color: rgba(248,245,238,0.3); background: rgba(248,245,238,0.08); }
    .rate-dot { width: 6px; height: 6px; border-radius: 50%; background: #d4a96a; flex-shrink: 0; }
    .rate-dot.live { background: #7aab4e; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .rate-dot.loading { animation: pulse 1s infinite; }
    /* Language dropdown */
    .lang-dd { position: relative; }
    .lang-dd-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; background: transparent; border: none; color: var(--color-text-secondary); padding: 4px 2px; }
    .lang-dd-btn:hover { color: var(--color-text-primary); }
    .lang-dd-btn svg { opacity: .5; }
    .lang-dd-menu { position: absolute; right: 0; top: calc(100% + 6px); background: var(--color-background-primary); border: .5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); box-shadow: 0 4px 16px rgba(0,0,0,.08); min-width: 110px; overflow: hidden; display: none; z-index: 200; }
    .lang-dd-menu.open { display: block; }
    .lang-dd-item { display: block; width: 100%; text-align: left; padding: 8px 14px; font-size: 13px; cursor: pointer; background: transparent; border: none; color: var(--color-text-secondary); }
    .lang-dd-item:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
    .lang-dd-item.on { color: var(--color-text-primary); font-weight: 500; }
    /* Nav link-style buttons (no border) */
    .nav-link-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; background: transparent; border: none; color: var(--color-text-secondary); padding: 4px 2px; }
    .nav-link-btn:hover { color: var(--color-text-primary); }
    /* Icon-above-label nav item style */
    .nav-icon-btn { display: inline-flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 3px; cursor: pointer; background: transparent; border: none; color: var(--color-text-secondary); padding: 2px 6px; font-family: var(--font-sans); transition: color .2s, background .2s; min-height: 38px; border-radius: 8px; }
    .nav-icon-btn span { font-size: 10px; line-height: 1; white-space: nowrap; }
    /* Shop button: sage green on hover */
    #nav-shop:hover { color: var(--splash-sage); }
    #nav-shop:active { color: #fff; background: var(--splash-sage); }
    /* Admin button: sand/gold on hover */
    #nav-admin:hover { color: var(--splash-sand); }
    #nav-admin:active { color: #fff; background: var(--splash-sand); }
    .nav.nav-hero .nav-icon-btn { color: rgba(248,245,238,0.88); }
    .nav.nav-hero .nav-icon-btn:hover { color: #fff; }
    .nav-cart-icon-btn { display: inline-flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 3px; cursor: pointer; background: transparent; border: none; color: var(--color-text-secondary); padding: 2px 6px; font-family: var(--font-sans); position: relative; transition: color .2s, background .2s; min-height: 38px; border-radius: 8px; }
    /* Cart button: cobalt blue on hover */
    .nav-cart-icon-btn:hover { color: var(--splash-cobalt); }
    .nav-cart-icon-btn:active { color: #fff; background: var(--splash-cobalt); }
    .nav-cart-icon-btn span.label { font-size: 10px; line-height: 1; white-space: nowrap; }
    .nav.nav-hero .nav-cart-icon-btn { color: rgba(248,245,238,0.88); }
    .nav.nav-hero .nav-cart-icon-btn:hover { color: #fff; }
    /* Register / Login / Admin nav colours */
    #nav-reg:hover  { color: var(--splash-plum); }
    #nav-reg:active { color: #fff; background: var(--splash-plum); }
    #nav-login:hover  { color: #c0392b; }
    #nav-login:active { color: #fff; background: #c0392b; }
    /* Admin (logged-in) button stays warm brown */
    #nr .nav-icon-btn[style*="854F0B"]:hover { color: var(--splash-sand) !important; }
    #nr .nav-icon-btn[style*="854F0B"]:active { color: #fff !important; background: var(--splash-sand); }
    /* Legacy lang-toggle hidden */
    .lang-toggle { display: none; }

    .btn { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; border: .5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 14px; background: transparent; color: var(--color-text-primary); }
    .btn:hover { background: var(--color-background-secondary); }
    .btn:active { transform: scale(.98); }
    .btn.p { background: var(--color-text-primary); color: var(--color-background-primary); border-color: transparent; }
    .btn.p:hover { opacity: .85; }
    .btn.sm { font-size: 12px; padding: 4px 10px; }
    .btn.d { border-color: #e8b4b4; color: #c0392b; background: #fff5f5; }
    .btn.d:hover { background: #fde8e8; border-color: #c0392b; }
    .ava { width: 30px; height: 30px; border-radius: 50%; background: #e8f0d8; color: #4a6b20; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; cursor: pointer; border: .5px solid #bdd496; }
    .bdg { border-radius: 999px; font-size: 11px; font-weight: 500; padding: 2px 8px; display: inline-block; }
    .bdg.g { background: #e8f0d8; color: #4a6b20; }
    .bdg.b { background: #ddeaf7; color: #1e5c9e; }
    .bdg.a { background: var(--color-accent-light); color: #7a5230; }

    /* ── Hero Carousel — Heytea style ──────────────────────────── */
    .hero-wrapper { padding: 1rem 1.5rem 0; }
    .hero { position: relative; min-height: 500px; height: 500px; overflow: hidden; background: #f5f3ef; border-radius: 16px; box-shadow: 0 2px 20px rgba(0,0,0,0.07); }
    .hero.no-img { background: #f5f3ef; min-height: 380px; height: 380px; }

    /* Carousel track — must span all slides side-by-side */
    .hero-track { display: flex; width: 300%; height: 100%; position: absolute; top: 0; left: 0; bottom: 0; right: auto; transition: transform .65s cubic-bezier(.4,0,.2,1); will-change: transform; }

    /* Each slide: exactly 1/3 of the track width = 100% of the visible hero */
    .hero-slide {
      position: relative; width: calc(100% / 3); min-width: calc(100% / 3); flex-shrink: 0; height: 100%;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* Uploaded bg image — full cover with overlay for text legibility */
    .hero-slide-bg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; display: block; opacity: 1;
    }
    /* No overlay — show image as-is */
    .hero-slide-overlay { display: none !important; }
    .hero-grain { display: none !important; }

    /* Big centred product photo (when uploaded) */
    .hero-product-img {
      position: absolute;
      bottom: 0; left: 50%; transform: translateX(-50%);
      height: 88%; width: auto; max-width: 55%;
      object-fit: contain; object-position: bottom;
      z-index: 2;
      filter: drop-shadow(0 24px 48px rgba(0,0,0,0.10));
    }

    /* Top-left: small editorial label */
    .hero-label {
      position: absolute; top: 2rem; left: 2.5rem; z-index: 3;
      font-size: 10px; font-weight: 500; letter-spacing: .14em;
      text-transform: uppercase; color: #999; font-family: var(--font-sans);
    }

    /* Bottom-left: headline block */
    .hero-content {
      position: absolute; bottom: 3.5rem; left: 2.5rem; z-index: 3;
      max-width: 340px; min-width: 260px;
    }
    .hero h1 {
      font-size: 28px; font-weight: 400; line-height: 1.2;
      letter-spacing: -.5px; color: #1a1a1a; margin-bottom: 6px;
      font-family: var(--font-sans);
    }
    .hero p { font-size: 13px; color: #555; margin-bottom: 1.5rem; font-weight: 400; line-height: 1.6; }

    /* CTA buttons — Heytea outlined rectangle pair */
    .hero-cta-row { display: flex; gap: 10px; }
    .hero-cta-btn {
      flex: 0 0 auto; min-width: 120px; max-width: 160px;
      padding: 11px 20px; text-align: center;
      font-size: 13px; font-weight: 400; letter-spacing: .03em;
      border: 1px solid #1a1a1a; background: transparent; color: #1a1a1a;
      border-radius: 3px; cursor: pointer; transition: all .18s;
      font-family: var(--font-sans); white-space: nowrap;
    }
    .hero-cta-btn:hover { background: #1a1a1a; color: #fff; }
    .hero-cta-btn.filled { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .hero-cta-btn.filled:hover { background: #333; }

    /* Heytea-style scattered Chinese characters — decorative, sparse, handwritten feel */
    .hero-zh-text { display: none; }
    .hero-zh-main { display: none; }
    .hero-zh-sub { display: none; }
    .hero-zh-tag { display: none; }
    .hero-zh-divider { display: none; }

    /* Admin edit button */
    .hero-slide-edit-btn {
      position: absolute; top: 1rem; right: 1rem; z-index: 10;
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.9); border: .5px solid rgba(0,0,0,0.12);
      border-radius: 6px; padding: 5px 10px; font-size: 12px; font-weight: 500;
      cursor: pointer; color: #1a1a1a; backdrop-filter: blur(6px);
      transition: background .15s;
    }
    .hero-slide-edit-btn:hover { background: #fff; }

    /* Carousel dots — small dark pills */
    .hero-dots {
      position: absolute; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
      z-index: 4; display: flex; gap: 6px; align-items: center;
    }
    .hero-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(26,26,26,0.2); border: none; padding: 0; cursor: pointer; transition: all .3s; }
    .hero-dot.on { background: #1a1a1a; width: 18px; border-radius: 2px; }

    /* Carousel arrows — minimal */
    .hero-arrow {
      position: absolute; top: 50%; transform: translateY(-50%); z-index: 4;
      background: rgba(255,255,255,0.7); border: .5px solid rgba(0,0,0,0.1);
      border-radius: 50%; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #1a1a1a; backdrop-filter: blur(4px); transition: background .2s;
    }
    .hero-arrow:hover { background: rgba(255,255,255,0.95); }
    .hero-arrow.prev { left: 1rem; }
    .hero-arrow.next { right: 1rem; }

    /* No-img fallback: show an SVG illustration placeholder */
    .hero-no-photo-art {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 260px; opacity: 0.08; z-index: 1; pointer-events: none;
    }

    /* hero mobile styles consolidated below */
    .filters { display: flex; gap: 6px; padding: 1.25rem 1.5rem; flex-wrap: wrap; border-bottom: none; background: var(--color-background-primary); }
    .fpill { padding: 5px 14px; border-radius: 2px; font-size: 11px; cursor: pointer; border: 1px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); transition: all .15s; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
    .fpill:hover { border-color: var(--splash-cobalt); color: var(--splash-cobalt); }
    .fpill.on { background: #1a1a1a; color: #fff; border-color: transparent; }

    .prods { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(280px, 100%), 1fr)); gap: 16px; padding: 1.5rem 2rem 2rem; background: var(--color-background-primary); }
    .pc { background: var(--color-background-secondary); border: none; border-radius: 18px; overflow: hidden; position: relative; }
    .pc:hover { border-color: var(--color-border-secondary); }
    .pi { height: 260px; display: flex; align-items: center; justify-content: center; font-size: 90px; background: var(--color-background-secondary); overflow: hidden; position: relative; }
    .pi img { width: 100%; height: 100%; object-fit: cover; }
    .pi-dots { position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
    .pi-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,.5); cursor: pointer; border: none; padding: 0; transition: background .15s; }
    .pi-dot.on { background: #fff; }
    .pi-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,.3); border: none; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; opacity: 0; transition: opacity .15s; }
    .pc:hover .pi-nav { opacity: 1; }
    .pi-nav.left { left: 10px; }
    .pi-nav.right { right: 10px; }
    .pi-expand { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,.28); border: none; border-radius: var(--border-radius-md); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; opacity: 0; transition: opacity .15s; }
    .pc:hover .pi-expand { opacity: 1; }
    .pb { padding: 16px 18px 18px; }
    .pn { font-size: 15px; font-weight: 500; margin-bottom: 4px; letter-spacing: -.2px; }
    .pd { display: none; }
    .pf { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-top: 10px; }
    .price-cny { font-size: 19px; font-weight: 600; color: var(--color-text-primary); }
    .price-usd { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }
    .ab { font-size: 13px; padding: 7px 18px; border-radius: 999px; border: .5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; white-space: nowrap; font-weight: 500; transition: all .15s; }
    .ab:hover { background: var(--color-text-primary); color: var(--color-background-primary); border-color: transparent; }
    /* product tag pill */
    .tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 999px; background: var(--color-accent-light); color: var(--color-accent); margin-bottom: 6px; border: .5px solid #dfc9aa; }

    /* ── Full-page product detail view — +Halle/Heytea inspired ── */
    .pdp { display: none; }
    .pdp.active { display: block; background: #f4f4f2; }
    .pdp-top-bar { display: flex; align-items: center; gap: 12px; padding: 12px 1.5rem; border-bottom: none; background: #f4f4f2; position: sticky; top: 57px; z-index: 40; }
    .pdp-back { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); cursor: pointer; background: none; border: none; padding: 0; letter-spacing: .05em; text-transform: uppercase; }
    .pdp-back:hover { color: var(--color-text-primary); }
    .pdp-breadcrumb { font-size: 12px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: .05em; }

    /* Mobile-first single column layout */
    .pdp-layout { display: flex; flex-direction: column; max-width: 540px; margin: 0 auto; min-height: calc(100vh - 120px); }
    .pdp-gallery-col { position: relative; background: #ebebea; display: flex; flex-direction: column; overflow: hidden; }
    .pdp-main-img-wrap { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #ebebea; height: 380px; }
    .pdp-main-img { width: 100%; height: 100%; object-fit: contain; display: block; padding: 2rem; }
    .pdp-main-emoji { font-size: 120px; }
    .pdp-thumbs { display: flex; gap: 6px; padding: 10px 14px; background: #f4f4f2; border-top: none; overflow-x: auto; flex-shrink: 0; }
    .pdp-thumb { width: 60px; height: 60px; border-radius: 4px; object-fit: cover; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; transition: border-color .15s; background: #ebebea; }
    .pdp-thumb.on { border-color: var(--color-text-primary); }
    .pdp-gallery-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,.7); border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #1a1a1a; z-index: 2; transition: background .15s; backdrop-filter: blur(4px); }
    .pdp-gallery-nav:hover { background: rgba(255,255,255,.95); }
    .pdp-gallery-nav.prev { left: 12px; }
    .pdp-gallery-nav.next { right: 12px; }
    .pdp-img-counter { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.25); color: #fff; font-size: 11px; padding: 2px 10px; border-radius: 999px; }

    /* Info column — editorial, minimal, Heytea-clean */
    .pdp-info-col { padding: 2rem 1.5rem 6rem; background: #fff; flex: 1; }
    .pdp-name { font-size: 28px; font-weight: 400; letter-spacing: -.5px; margin-bottom: 8px; line-height: 1.15; font-family: var(--font-serif); }
    .pdp-price-cny { font-size: 22px; font-weight: 500; }
    .pdp-price-usd { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
    .pdp-divider { height: 1px; background: #ebebea; margin: 1.5rem 0; }
    .pdp-desc { font-size: 14px; color: var(--color-text-secondary); line-height: 1.9; margin-bottom: 1.25rem; }
    .pdp-variant-label { font-size: 10px; font-weight: 600; color: var(--color-text-tertiary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .12em; }

    /* Colour accent label chip on PDP */
    .pdp-category-chip { display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; background: var(--splash-cobalt); color: #fff; padding: 3px 10px; border-radius: 999px; margin-bottom: 16px; }

    /* Sticky bottom add-to-cart bar — clean Heytea style */
    .pdp-bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #ebebea; padding: 14px 1.5rem; display: none; z-index: 100; max-width: 540px; margin: 0 auto; }
    .pdp.active .pdp-bottom-bar { display: flex; gap: 12px; align-items: center; }
    .pdp-qty-row { display: flex; align-items: center; gap: 10px; }
    .pdp-qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid #d8d8d8; background: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--color-text-primary); transition: all .15s; }
    .pdp-qty-btn:hover { background: var(--color-text-primary); color: #fff; border-color: var(--color-text-primary); }
    .pdp-qty-num { font-size: 15px; font-weight: 500; min-width: 20px; text-align: center; }
    .pdp-add-btn { flex: 1; display: flex; align-items: center; justify-content: center; padding: 14px; background: #1a1a1a; color: #fff; border: none; border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .15s; letter-spacing: .05em; text-transform: uppercase; }
    .pdp-add-btn:hover { opacity: .82; }
    .pdp-add-btn:active { transform: scale(.99); }

    /* Tag pills on PDP */
    .pdp-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .pdp-tag { font-size: 11px; padding: 3px 12px; border-radius: 999px; border: .5px solid #d8d8d8; color: var(--color-text-secondary); background: #f4f4f2; }
    .pdp-tag.accent { background: var(--splash-cobalt-light); color: var(--splash-cobalt); border-color: rgba(61,79,214,.2); }

    /* Ingredient/detail row */
    .pdp-detail-row { display: flex; align-items: center; gap: 8px; padding: 14px 0; border-bottom: 1px solid #ebebea; cursor: pointer; }
    .pdp-detail-row:hover .pdp-detail-arrow { opacity: 1; }
    .pdp-detail-icon { width: 32px; height: 32px; border-radius: 50%; background: #ebebea; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .pdp-detail-text { font-size: 13px; color: var(--color-text-secondary); flex: 1; }
    .pdp-detail-arrow { opacity: .4; transition: opacity .15s; }

    @media (min-width: 700px) {
      .pdp-layout { flex-direction: row; max-width: 100%; align-items: flex-start; }
      .pdp-gallery-col { position: sticky; top: 104px; width: 50%; height: calc(100vh - 104px); }
      .pdp-main-img-wrap { height: 100%; flex: 1; }
      .pdp-info-col { width: 50%; padding: 3rem 3rem 6rem; overflow-y: auto; max-height: calc(100vh - 104px); }
      .pdp-bottom-bar { left: 50%; right: 0; max-width: none; }
      .pdp-name { font-size: 36px; }
    }

    /* ── Cart Drawer — side panel style ── */
    .cart-drawer {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 480px; max-width: 100vw;
      background: #f5f5f5;
      max-height: 100vh; overflow: hidden;
      z-index: 100;
      box-shadow: -4px 0 32px rgba(0,0,0,.18);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    .cart-drawer.open { transform: translateX(0); }
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 99; opacity: 0; transition: opacity .25s; }
    .cart-overlay.open { opacity: 1; }
    /* Cart header */
    .cart-header { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 52px; background: #fff; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }
    .cart-header-title { font-size: 17px; font-weight: 600; color: #1a1a1a; }
    .cart-header-count { font-size: 13px; color: #999; margin-left: 5px; font-weight: 400; }
    .cart-close-btn { width: 32px; height: 32px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #999; border-radius: 50%; transition: background .15s; }
    .cart-close-btn:hover { background: #f5f5f5; color: #333; }
    /* Filter bar */
    .cart-filter-bar { display: flex; background: #fff; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
    .cart-filter-bar::-webkit-scrollbar { display: none; }
    .cart-filter-tab { flex-shrink: 0; display: inline-flex; align-items: center; gap: 4px; padding: 9px 14px; font-size: 12px; font-weight: 500; color: #666; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; font-family: var(--font-sans); transition: color .15s; }
    .cart-filter-tab.on { color: var(--splash-cobalt); border-bottom-color: var(--splash-cobalt); }
    /* Body */
    .cart-body { flex: 1; overflow-y: auto; padding: 8px 0 0; }
    /* Store block */
    .cart-store-block { background: #fff; margin-bottom: 8px; }
    .cart-store-header { display: flex; align-items: center; gap: 8px; padding: 11px 14px 10px; border-bottom: .5px solid #f5f5f5; }
    .cart-store-badge { font-size: 11px; font-weight: 700; padding: 1px 6px; border-radius: 3px; flex-shrink: 0; }
    .cart-store-badge.taobao { background: var(--splash-cobalt); color: #fff; }
    .cart-store-name { font-size: 13px; font-weight: 600; color: #1a1a1a; display: flex; align-items: center; gap: 4px; }
    .cart-store-arrow { color: #bbb; font-size: 12px; }
    /* Item row */
    .cart-item-row { display: flex; align-items: flex-start; gap: 10px; padding: 13px 14px; border-bottom: .5px solid #f8f8f8; }
    .cart-item-row:last-child { border-bottom: none; }
    .cart-item-checkbox { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #ddd; background: #fff; flex-shrink: 0; margin-top: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color .15s; }
    .cart-item-checkbox.checked { border-color: var(--splash-cobalt); background: var(--splash-cobalt); }
    .cart-item-checkbox.checked::after { content: ''; width: 5px; height: 9px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px,-1px); }
    .cart-item-img-wrap { position: relative; flex-shrink: 0; }
    .cart-item-img { width: 88px; height: 88px; border-radius: 6px; object-fit: cover; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 30px; overflow: hidden; }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
    .cart-compare-btn { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,.45); color: #fff; font-size: 10px; text-align: center; padding: 3px 0; border-radius: 0 0 6px 6px; cursor: pointer; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-size: 13px; color: #1a1a1a; line-height: 1.45; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .cart-item-variant { font-size: 11px; color: #666; background: #f5f5f5; border-radius: 3px; padding: 2px 8px; display: inline-flex; align-items: center; gap: 3px; margin-bottom: 8px; cursor: pointer; }
    .cart-item-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .cart-item-price { font-size: 17px; font-weight: 700; color: var(--splash-cobalt); line-height: 1; }
    .cart-item-price-orig { font-size: 11px; color: #ccc; text-decoration: line-through; margin-left: 4px; }
    .cart-qty-ctrl { display: flex; align-items: center; border: 1px solid #e8e8e8; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
    .cart-qty-btn { width: 30px; height: 28px; border: none; background: #fafafa; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: #444; transition: background .1s; font-family: var(--font-sans); }
    .cart-qty-btn:hover { background: #f0f0f0; }
    .cart-qty-btn:active { background: #e8e8e8; }
    .cart-qty-num { width: 40px; height: 28px; border: none; border-left: 1px solid #e8e8e8; border-right: 1px solid #e8e8e8; text-align: center; font-size: 14px; font-weight: 700; background: #fff; color: #1a1a1a; font-family: var(--font-sans); }
    .cart-qty-num::-webkit-inner-spin-button, .cart-qty-num::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .cart-qty-num[type=number] { -moz-appearance: textfield; }
    /* Footer */
    .cart-footer { background: #fff; border-top: 1px solid #f0f0f0; padding: 0; flex-shrink: 0; }
    .cart-footer-top { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-bottom: .5px solid #f5f5f5; }
    .cart-footer-savings { font-size: 12px; color: var(--splash-cobalt); }

    .cart-footer-main { display: flex; align-items: center; padding: 10px 14px; }
    .cart-select-all { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #333; cursor: pointer; flex-shrink: 0; margin-right: 12px; }
    .cart-total-block { flex: 1; text-align: right; }
    .cart-total-price { font-size: 20px; font-weight: 700; color: var(--splash-cobalt); line-height: 1.1; }
    .cart-total-price sup { font-size: 13px; font-weight: 600; vertical-align: super; }
    .cart-total-fee { font-size: 11px; color: #999; }
    .cart-checkout-btn { background: var(--splash-cobalt); color: #fff; border: none; border-radius: 999px; padding: 13px 24px; font-size: 15px; font-weight: 700; cursor: pointer; white-space: nowrap; margin-left: 12px; font-family: var(--font-sans); transition: opacity .15s, transform .1s; box-shadow: 0 2px 8px rgba(61,79,212,.35); }
    .cart-checkout-btn:hover { opacity: .9; }
    .cart-checkout-btn:active { transform: scale(.97); }
    /* Empty */
    .cart-empty { text-align: center; padding: 4.5rem 2rem; color: #999; }
    .cart-empty-icon { font-size: 56px; margin-bottom: 14px; opacity: .5; }
    .cart-empty-title { font-size: 15px; font-weight: 500; color: #555; margin-bottom: 6px; }
    .cart-empty-sub { font-size: 12px; color: #bbb; }
    /* Mobile full-width */
    @media (max-width: 600px) { .cart-drawer { width: 100vw; } .cart-item-img { width: 78px; height: 78px; } }
    /* Desktop nav cart button */
    .nav-cart-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; border: none; border-radius: var(--border-radius-md); padding: 6px 12px; background: transparent; color: var(--color-text-primary); font-family: var(--font-sans); position: relative; transition: background .15s; }
    .nav-cart-btn:hover { background: var(--color-background-secondary); }
    .nav-cart-count { min-width: 16px; height: 16px; border-radius: 999px; background: var(--color-accent); color: #fff; font-size: 10px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; padding: 0 3px; }
    /* Mobile cart button */
    .mob-cart-btn { display: none; position: relative; align-items: center; justify-content: center; width: 36px; height: 36px; background: transparent; border: none; border-radius: var(--border-radius-md); cursor: pointer; flex-shrink: 0; color: var(--color-text-primary); }
    .mob-cart-btn:hover { background: var(--color-background-secondary); }
    .mob-cart-btn:active { color: var(--splash-cobalt); background: var(--splash-cobalt-light); }
    .mob-cart-badge { position: absolute; top: -3px; right: -3px; background: var(--color-accent); color: #fff; font-size: 10px; font-weight: 700; min-width: 16px; height: 16px; border-radius: 999px; display: flex; align-items: center; justify-content: center; padding: 0 3px; border: 1.5px solid var(--color-background-primary); }
    @media (max-width: 600px) { .mob-cart-btn { display: flex !important; } }

    .ov { background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; min-height: 480px; }
    .mod { background: var(--color-background-primary); border: .5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 2rem; width: 100%; max-width: 420px; }
    .mod h2 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
    .msub { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.25rem; line-height: 1.6; }
    .fl { margin-bottom: 10px; }
    .fl label { display: block; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; font-weight: 500; }
    .fl input, .fl select, .fl textarea { width: 100%; }
    .fl textarea { height: 60px; resize: vertical; }
    /* Rich text editor */
    .rte-wrap { border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); overflow: hidden; background: var(--color-background-primary); }
    .rte-wrap:focus-within { border-color: var(--color-border-primary); }
    .rte-toolbar { display: flex; flex-wrap: wrap; gap: 2px; padding: 5px 6px; background: var(--color-background-secondary); border-bottom: 0.5px solid var(--color-border-secondary); }
    .rte-btn { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border: none; background: transparent; border-radius: 4px; cursor: pointer; font-size: 12px; color: var(--color-text-secondary); font-family: var(--font-sans); }
    .rte-btn:hover { background: var(--color-border-tertiary); color: var(--color-text-primary); }
    .rte-btn.on { background: var(--color-text-primary); color: var(--color-background-primary); }
    .rte-sep { width: 0.5px; background: var(--color-border-secondary); margin: 2px 3px; align-self: stretch; }
    .rte-body { min-height: 80px; max-height: 260px; overflow-y: auto; padding: 8px 10px; font-size: 13px; line-height: 1.65; outline: none; color: var(--color-text-primary); }
    .rte-body p { margin: 0 0 4px; }
    .rte-body ul, .rte-body ol { padding-left: 1.4em; margin: 4px 0; }
    .rte-body li { margin-bottom: 2px; }
    .rte-body strong { font-weight: 600; }
    .rte-body em { font-style: italic; }
    .rte-body u { text-decoration: underline; }
    .rte-body h3 { font-size: 14px; font-weight: 600; margin: 6px 0 2px; }
    .rte-body:empty:before { content: attr(data-placeholder); color: var(--color-text-tertiary); pointer-events: none; display: block; }
    /* PDP description rich text rendering */
    .pdp-desc ul, .pdp-desc ol { padding-left: 1.5em; margin: 6px 0; }
    .pdp-desc li { margin-bottom: 3px; }
    .pdp-desc strong { font-weight: 600; }
    .pdp-desc em { font-style: italic; }
    .pdp-desc h3 { font-size: 15px; font-weight: 600; margin: 8px 0 4px; }
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .sb { height: 3px; border-radius: 2px; margin-top: 5px; transition: width .2s, background .2s; }

    .m.i { color: #1e5c9e; background: #ddeaf7; }
    .m.w { color: var(--color-accent); background: var(--color-accent-light); }
    .sw { text-align: center; margin-top: 14px; font-size: 12px; color: var(--color-text-secondary); }
    .sw a { color: var(--color-text-primary); cursor: pointer; text-decoration: underline; }
    .dv { height: .5px; background: var(--color-border-tertiary); margin: 1rem 0; }

    .pg { max-width: 560px; margin: 2rem auto; padding: 0 1.5rem; }

    .prod-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: .5px solid var(--color-border-tertiary); }

    .img-upload-box:hover { background: var(--color-background-secondary); }

    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
    .dot.g { background: #639922; } .dot.r { background: #E24B4A; }

    .pc { cursor: pointer; transition: transform .15s; }

    /* Editorial section header above product grid */
    .shop-section-header {
      padding: 2.5rem 1.5rem 0;
      display: flex; align-items: flex-end; justify-content: space-between;
      background: var(--color-background-primary);
    }

    /* Image crop tool */

    .pay-wechat { background: #07C160; color: #fff; } .pay-wechat:hover { opacity: .9; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }

    tbody tr:hover { background: var(--color-background-secondary); }
    .sect { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .5px; margin: 14px 0 8px; padding-bottom: 4px; border-bottom: .5px solid var(--color-border-tertiary); }
    .qr-upload-box { border: .5px dashed var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 14px; text-align: center; cursor: pointer; background: var(--color-background-primary); }
    .qr-upload-box:hover { background: var(--color-background-secondary); }
    .qr-display { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }

  <script>
  // ── Zeabur PostgreSQL adapter ─────────────────────────────────────────────
  // Replaces the Supabase SDK. Talks to the Express backend (server.js) via
  // a simple REST API + Server-Sent Events for real-time updates.
  // No external SDK needed — plain fetch() only.
  window.addEventListener('DOMContentLoaded', function(){
    const MAIN_DOC = 'shopdata';

    // Base URL: when served by the same Node server, '' works for relative paths.
    // If you host the frontend separately, set this to your Zeabur backend URL.
    const API_BASE = '';

    // ── doc ref ─────────────────────────────────────────────────────────────
    function zbDoc(db_unused, collection_unused, docId){ return { _id: docId }; }

    // ── getDoc ──────────────────────────────────────────────────────────────
    async function zbGetDoc(ref){
      try{
        const res = await fetch(`${API_BASE}/api/doc/${ref._id}`);
        // 404 means the document simply doesn't exist yet — not an error
        if(res.status === 404) return { exists: ()=> false, data: ()=> null };
        if(!res.ok) throw new Error('getDoc HTTP ' + res.status);
        const json = await res.json();
        return { exists: ()=> json.exists, data: ()=> json.data };
      }catch(e){ console.error('zbGetDoc error ('+ref._id+'):', e); throw e; }
    }

    // ── setDoc ──────────────────────────────────────────────────────────────
    async function zbSetDoc(ref, payload, opts){
      try{
        const res = await fetch(`${API_BASE}/api/doc/${ref._id}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: payload, merge: !!(opts && opts.merge) })
        });
        if(!res.ok) throw new Error('setDoc HTTP ' + res.status);
        console.log('Zeabur PG saved:', ref._id);
      }catch(e){ console.error('zbSetDoc error ('+ref._id+'):', e); throw e; }
    }

    // ── onSnapshot (SSE + polling fallback) ─────────────────────────────────
    const _snapActive = {};
    function zbOnSnapshot(ref, callback){
      const key = ref._id;
      if(_snapActive[key]) return;
      _snapActive[key] = true;

      // Fire immediately with current value
      zbGetDoc(ref).then(snap=>{ if(snap.exists()) callback(snap); }).catch(()=>{});

      // SSE for real-time push
      let es;
      function connectSSE(){
        try{
          es = new EventSource(`${API_BASE}/api/events/${key}`);
          es.onmessage = async ()=>{
            const snap = await zbGetDoc(ref);
            callback(snap);
          };
          es.onerror = ()=>{
            es.close();
            // Retry SSE after 5 s
            setTimeout(connectSSE, 5000);
          };
        }catch(e){
          // Browser doesn't support SSE — fall through to polling
          startPolling();
        }
      }

      function startPolling(){
        if(_snapActive[key+'_poll']) return;
        _snapActive[key+'_poll'] = setInterval(async()=>{
          const snap = await zbGetDoc(ref);
          callback(snap);
        }, 4000);
      }

      if(typeof EventSource !== 'undefined'){
        connectSSE();
      } else {
        startPolling();
      }
    }

    // ── Storage shim — replaces Supabase Storage ─────────────────────────────
    // Returns an object that mimics the Supabase storage bucket API surface
    // used in this app (upload, getPublicUrl).
    const zbStorage = {
      from(bucket){
        return {
          async upload(filePath, file, opts){
            const form = new FormData();
            form.append('file', file, file.name || 'upload');
            form.append('bucket', bucket);
            form.append('path', filePath);
            try{
              const res = await fetch(`${API_BASE}/api/storage/upload`, { method:'POST', body: form });
              const json = await res.json();
              if(!res.ok || !json.ok) return { data: null, error: { message: json.error || 'Upload failed' } };
              return { data: { path: filePath, publicUrl: json.publicUrl }, error: null };
            }catch(e){ return { data: null, error: { message: e.message } }; }
          },
          getPublicUrl(filePath){
            return { data: { publicUrl: `${API_BASE}/api/storage/object/${bucket}/${filePath}` } };
          }
        };
      }
    };

    // ── Image helpers (base64 stored inline in DB — no separate bucket needed) ──
    // Mirrors the interface used by all image-upload code (handleSlideImg,
    // handleProdImgs, handleQr) so they work without any other changes.
    window._fb.uploadImage = async function(path, base64DataUrl){
      // Store base64 inline in the DB row; just return the dataUrl as the URL.
      return base64DataUrl;
    };
    window._fb.deleteImage = async function(path){ /* no-op */ };
    window._fb.isBase64 = function(str){ return typeof str==='string' && str.startsWith('data:image'); };

    // ── Wire up window._fb and boot ──────────────────────────────────────────
    const storeDocRef = zbDoc(null, null, MAIN_DOC);
    window._fb.fsdb       = { storage: zbStorage };
    window._fb.storeDoc   = storeDocRef;
    window._fb.setDoc     = zbSetDoc;
    window._fb.getDoc     = zbGetDoc;
    window._fb.onSnapshot = zbOnSnapshot;
    window._fb.doc        = zbDoc;

    console.log('Zeabur PostgreSQL adapter ready — booting...');
    window._boot();
  });
  </script>

// ── Per-session state (never synced to Supabase) ─────────────────────────
// db.cur (logged-in user), db.adm (admin flag) stay local per session only.
// Everything else (products, referrers, users, adminEmail/Password, heroImage,
// heroTextTitle, heroTextSub, feeRate) is synced globally via Supabase.

const SYNC_KEYS = ['products','referrers','users','adminEmail','adminPassword',
  'adminCreated','heroTextTitle','heroTextSub','feeRate','categories'];
// Image-only keys stored in a separate Supabase row to keep the main
// doc small and fast. heroImage + per-product imgs arrays live here.
const IMG_DOC_KEY = 'netiva_images';

let _svPending = false;
let _fbReady = false;


window._fb = { fsdb:null, storeDoc:null, setDoc:null, getDoc:null, onSnapshot:null, doc:null };
const _fb = window._fb;

// ── Image storage: one Supabase row per product, one for hero, one per referrer ──
// netiva/hero          → { heroImage: '...' }
// netiva/img_p1        → { imgs: [...base64...] }
// netiva/img_p2        → { imgs: [...base64...] }
// netiva/ref_r1        → { alipayQr: '...', wechatQr: '...' }
// This gives each item its own budget — no more size limits.

function _buildMainPayload(){
  // Strip imgs/img from products and QRs from referrers — keep only metadata
  const payload={};
  SYNC_KEYS.forEach(k=>{
    if(k==='products'){
      payload.products=(db.products||[]).map(p=>{
        const {img,imgs,content_en,content_zh,content_zht,...rest}=p; return rest;
      });
    } else if(k==='referrers'){
      payload.referrers=(db.referrers||[]).map(r=>{
        const {alipayQr,wechatQr,...rest}=r; return rest;
      });
    } else {
      if(db[k]!==undefined) payload[k]=db[k];
    }
  });
  return payload;
}

// Apply a single product image doc { imgs:[...] } into db
function _applyProdImgDoc(prodId, data){
  if(!data) return;
  const prod=(db.products||[]).find(p=>p.id===prodId);
  if(!prod) return;
  if(Array.isArray(data.imgs)){ prod.imgs=data.imgs; prod.img=data.imgs[0]||''; }
}
// Apply a single product text doc { content_en, content_zh } into db
function _applyProdTextDoc(prodId, data){
  if(!data) return;
  const prod=(db.products||[]).find(p=>p.id===prodId);
  if(!prod) return;
  if(data.content_en!==undefined) prod.content_en=data.content_en;
  if(data.content_zh!==undefined) prod.content_zh=data.content_zh;
  if(data.content_zht!==undefined) prod.content_zht=data.content_zht;
}
// Apply hero doc
function _applyHeroDoc(data){
  if(!data) return;
  if(data.heroImage!==undefined) db.heroImage=data.heroImage;
  // Per-slide overlay images
  if(!db.heroSlides) db.heroSlides=[{},{},{}];
  for(let i=0;i<3;i++){
    if(data['slide'+i]!==undefined) db.heroSlides[i]=data['slide'+i];
  }
}
// Apply referrer QR doc
function _applyRefDoc(refId, data){
  if(!data) return;
  const ref=(db.referrers||[]).find(r=>r.id===refId);
  if(!ref) return;
  if(data.alipayQr!==undefined) ref.alipayQr=data.alipayQr;
  if(data.wechatQr!==undefined) ref.wechatQr=data.wechatQr;
}

// Legacy: still support reading old shopimages doc during migration
function _applyImgPayload(data){
  if(!data) return;
  if(data.heroImage!==undefined) db.heroImage=data.heroImage;
  if(!db.heroSlides) db.heroSlides=[{},{},{}];
  for(let i=0;i<3;i++){ if(data['heroSlide'+i]!==undefined){ if(!db.heroSlides[i])db.heroSlides[i]={}; db.heroSlides[i].img=data['heroSlide'+i]; } }
  (db.products||[]).forEach(prod=>{
    const key='pi_'+prod.id;
    if(data[key]!==undefined){ prod.imgs=data[key]; prod.img=data[key][0]||''; }
  });
  (db.referrers||[]).forEach(ref=>{
    if(data['aqr_'+ref.id]!==undefined) ref.alipayQr=data['aqr_'+ref.id];
    if(data['wqr_'+ref.id]!==undefined) ref.wechatQr=data['wqr_'+ref.id];
  });
}

// Build localStorage cache of all images (flat, for fast boot)
function _buildLocalImgCache(){
  const p={};
  if(db.heroImage!==undefined) p.heroImage=db.heroImage;
  (db.heroSlides||[]).forEach((s,i)=>{ if(s&&s.img) p['heroSlide'+i]=s.img; });
  (db.products||[]).forEach(prod=>{
    if(prod.imgs&&prod.imgs.length) p['pi_'+prod.id]=prod.imgs;
    else if(prod.img) p['pi_'+prod.id]=[prod.img];
  });
  (db.referrers||[]).forEach(ref=>{
    if(ref.alipayQr) p['aqr_'+ref.id]=ref.alipayQr;
    if(ref.wechatQr) p['wqr_'+ref.id]=ref.wechatQr;
  });
  return p;
}

// ── Dirty-doc tracking ───────────────────────────────────────────────────────
// Instead of re-uploading every doc on every sv() call, we track exactly which
// Supabase rows have pending changes and flush only those.
const _dirtyDocs={}; // docId -> payload to write
let _flushTimer=null;

// Mark a specific doc as needing a write. payload=null means "main store doc".
function _markDirty(docId, payload){
  _dirtyDocs[docId]=payload;
}

// Flush all dirty rows to Supabase immediately (no delay).
async function _flushDirty(){
  if(_flushTimer){ clearTimeout(_flushTimer); _flushTimer=null; }
  if(typeof _fb?.setDoc !== 'function') return;
  const ids=Object.keys(_dirtyDocs);
  if(!ids.length) return;
  // Snapshot and clear immediately so concurrent calls don't double-write
  const toWrite={..._dirtyDocs};
  ids.forEach(id=>{ delete _dirtyDocs[id]; });
  await Promise.all(ids.map(async id=>{
    try{
      if(id==='__main__'){
        await _fb.setDoc(_fb.storeDoc, _buildMainPayload(), {merge:true});
      } else {
        const ref=_fb.doc(_fb.fsdb,'netiva',id);
        await _fb.setDoc(ref, toWrite[id], {merge:true});
      }
    }catch(e){ console.warn('Supabase write failed ('+id+'):',e); }
  }));
}

// Debounced flush — used for rapid-fire changes (e.g. typing in a field).
function _scheduleDirtyFlush(delayMs=150){
  if(_flushTimer) clearTimeout(_flushTimer);
  _flushTimer=setTimeout(()=>{ _flushTimer=null; _flushDirty(); }, delayMs);
}

// sv(immediate) — call with immediate=true from explicit "Save" button handlers
// so changes appear for other users without any delay.
function sv(immediate=false){
  db.feeRate = FEE_RATE;
  // Always update localStorage instantly
  try{
    const mainSnap={...db, products:_buildMainPayload().products, referrers:_buildMainPayload().referrers};
    localStorage.setItem('netiva_shop', JSON.stringify(mainSnap));
    localStorage.setItem(IMG_DOC_KEY, JSON.stringify(_buildLocalImgCache()));
  }catch(e){}
  if(!_fbReady) return;

  // Main metadata doc — always dirty when sv() is called
  _markDirty('__main__', null);

  // Hero image
  const _heroDocPayload={};
  if(db.heroImage) _heroDocPayload.heroImage=db.heroImage;
  (db.heroSlides||[]).forEach((s,i)=>{ if(s) _heroDocPayload['slide'+i]=s; });
  if(Object.keys(_heroDocPayload).length) _markDirty('hero', _heroDocPayload);

  // Only dirty the image/text docs for products that have content
  // (we don't re-dirty every product — callers use svProd() for targeted writes)
  (db.products||[]).forEach(prod=>{
    const imgs=prod.imgs&&prod.imgs.length ? prod.imgs : (prod.img ? [prod.img] : []);
    if(imgs.length) _markDirty('img_'+prod.id, {imgs});
    const hasText=prod.content_en||prod.content_zh||prod.content_zht;
    if(hasText) _markDirty('text_'+prod.id, {content_en:prod.content_en||'', content_zh:prod.content_zh||'', content_zht:prod.content_zht||''});
  });

  (db.referrers||[]).forEach(ref=>{
    if(ref.alipayQr||ref.wechatQr) _markDirty('ref_'+ref.id, {alipayQr:ref.alipayQr||'', wechatQr:ref.wechatQr||''});
  });

  if(immediate){ _flushDirty(); }
  else { _scheduleDirtyFlush(150); }
}

// Targeted save for a single product — only uploads docs that belong to it.
// Pass immediate=true from explicit Save button handlers.
function svProd(prodId, immediate=false){
  db.feeRate = FEE_RATE;
  try{
    const mainSnap={...db, products:_buildMainPayload().products, referrers:_buildMainPayload().referrers};
    localStorage.setItem('netiva_shop', JSON.stringify(mainSnap));
    localStorage.setItem(IMG_DOC_KEY, JSON.stringify(_buildLocalImgCache()));
  }catch(e){}
  if(!_fbReady) return;

  _markDirty('__main__', null);
  const prod=(db.products||[]).find(p=>p.id===prodId);
  if(prod){
    const imgs=prod.imgs&&prod.imgs.length ? prod.imgs : (prod.img ? [prod.img] : []);
    if(imgs.length) _markDirty('img_'+prodId, {imgs});
    const hasText=prod.content_en||prod.content_zh||prod.content_zht;
    if(hasText) _markDirty('text_'+prodId, {content_en:prod.content_en||'', content_zh:prod.content_zh||'', content_zht:prod.content_zht||''});
  }
  if(immediate){ _flushDirty(); }
  else { _scheduleDirtyFlush(150); }
}

// Track which doc IDs already have live listeners so we never double-register
const _liveListeners=new Set();

// During the initial Pass-2 image fetch we don't want every onSnapshot callback
// (which fires immediately upon registration with the current value) to trigger
// a re-render, because Pass-2 calls render() itself once everything is loaded.
// Set to true while Pass-2 is running; snapshot callbacks check this before rendering.
let _bootImgFetchInProgress=false;

// Debounced render: coalesces rapid snapshot events into a single repaint
let _renderDebounceTimer=null;
function _debouncedRender(){
  if(_bootImgFetchInProgress) return; // Pass-2 will render when done
  if(_renderDebounceTimer) clearTimeout(_renderDebounceTimer);
  _renderDebounceTimer=setTimeout(()=>{_renderDebounceTimer=null;try{render();}catch(e){}},120);
}

// Register onSnapshot listeners for a product doc that didn't exist at boot time
function _attachProdListeners(prod){
  if(!_fb.onSnapshot||!_fb.fsdb) return;
  const imgDocId='img_'+prod.id;
  const txtDocId='text_'+prod.id;
  if(!_liveListeners.has(imgDocId)){
    _liveListeners.add(imgDocId);
    try{
      const ref=_fb.doc(_fb.fsdb,'netiva',imgDocId);
      _fb.onSnapshot(ref,(snap)=>{
        if(!snap.exists()) return;
        _applyProdImgDoc(prod.id,snap.data());
        try{localStorage.setItem(IMG_DOC_KEY,JSON.stringify(_buildLocalImgCache()));}catch(e){}
        if(!db.adm){_debouncedRender();}
      });
    }catch(e){console.warn('listener attach failed for '+imgDocId,e);}
  }
  if(!_liveListeners.has(txtDocId)){
    _liveListeners.add(txtDocId);
    try{
      const ref=_fb.doc(_fb.fsdb,'netiva',txtDocId);
      _fb.onSnapshot(ref,(snap)=>{
        if(!snap.exists()) return;
        _applyProdTextDoc(prod.id,snap.data());
        _debouncedRender();
      });
    }catch(e){console.warn('listener attach failed for '+txtDocId,e);}
  }
}

// Register onSnapshot listener for a referrer QR doc
function _attachRefListener(ref){
  if(!_fb.onSnapshot||!_fb.fsdb) return;
  const docId='ref_'+ref.id;
  if(_liveListeners.has(docId)) return;
  _liveListeners.add(docId);
  try{
    const docRef=_fb.doc(_fb.fsdb,'netiva',docId);
    _fb.onSnapshot(docRef,(snap)=>{
      if(!snap.exists()) return;
      _applyRefDoc(ref.id,snap.data());
      try{localStorage.setItem(IMG_DOC_KEY,JSON.stringify(_buildLocalImgCache()));}catch(e){}
      if(!db.adm){_debouncedRender();}
    });
  }catch(e){console.warn('listener attach failed for '+docId,e);}
}



// Merge remote main-doc snapshot into local db.
// Images live in a separate doc and are applied via _applyImgPayload().
function _applyRemote(data){
  if(!data) return;
  SYNC_KEYS.forEach(k=>{
    if(data[k]===undefined) return;
    if(k==='products'){
      // Merge metadata only — preserve existing imgs arrays already in memory
      const incoming=data[k];
      const existing=db.products||[];
      db.products=incoming.map(np=>{
        const old=existing.find(op=>op.id===np.id)||{};
        return {...np, img:old.img||np.img||'', imgs:old.imgs||np.imgs||[],
          content_en:old.content_en||np.content_en||'',
          content_zh:old.content_zh||np.content_zh||'',
          content_zht:old.content_zht||np.content_zht||''};
      });
    } else if(k==='referrers'){
      const incoming=data[k];
      const existing=db.referrers||[];
      db.referrers=incoming.map(nr=>{
        const old=existing.find(or=>or.id===nr.id)||{};
        return {...nr, alipayQr:old.alipayQr||nr.alipayQr||'', wechatQr:old.wechatQr||nr.wechatQr||''};
      });
    } else {
      db[k]=data[k];
    }
  });
  if(!db.products) db.products=[];
  if(typeof db.feeRate==='number') FEE_RATE=db.feeRate;
  // Also cache main snapshot to localStorage
  try{localStorage.setItem('netiva_shop', JSON.stringify(db));}catch(e){}
}

// Bootstrap: instant paint from cache, then hydrate from Zeabur PostgreSQL in two passes
window._boot = async function _boot(){
  // Restore cart and session from localStorage immediately
  restoreSession();
  // ── Pass 0: render instantly from localStorage (zero network wait) ────────
  let hadCache=false;
  try{
    const cached=localStorage.getItem('netiva_shop');
    if(cached){ const p=JSON.parse(cached); _applyRemote(p); hadCache=true; }
    // Also restore cached images (flat legacy format works for both old and new)
    const cachedImgs=localStorage.getItem(IMG_DOC_KEY);
    if(cachedImgs){ _applyImgPayload(JSON.parse(cachedImgs)); }
  }catch(e){}

  if(hadCache){
    go('shop');
  } else {
    _showLoader();
  }

  // ── Pass 1: fetch lightweight metadata doc (no images) ───────────────────
  try{
    const snap = await _fb.getDoc(_fb.storeDoc);
    if(snap.exists()){
      _applyRemote(snap.data());
    } else {
      // First ever run — seed Supabase with defaults
      const mainSeed=_buildMainPayload();
      mainSeed.products=DEFAULT_PRODS.map(p=>{const{img,imgs,...r}=p;return r;});
      await _fb.setDoc(_fb.storeDoc, mainSeed);
    }
  }catch(e){
    console.warn('Supabase main read failed:',e);
    if(!hadCache){
      const warn=document.createElement('div');
      warn.style.cssText='position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:#FFF3CD;border:1px solid #EAD0A8;color:#854F0B;font-size:12px;padding:8px 16px;border-radius:8px;z-index:9999;max-width:420px;text-align:center';
      warn.innerHTML='⚠️ Could not reach the shared database. Changes may not sync until reconnected. <button onclick="this.parentNode.remove()" style="border:none;background:none;cursor:pointer;font-size:14px;margin-left:8px;color:#854F0B">×</button>';
      document.body.appendChild(warn);
    }
  }

  _fbReady=true;
  try{ go('shop'); }catch(e){}

  // ── Pass 2: fetch all image docs in background (non-blocking) ────────────
  // Skip Pass 2 if cache is fresh (< 1 hour old) — no need to re-fetch images.
  const CACHE_TTL=60*60*1000;
  const cacheAge=Date.now()-(parseInt(localStorage.getItem('netiva_cache_ts')||'0'));
  if(hadCache && cacheAge<CACHE_TTL){
    _bootImgFetchInProgress=false;
    try{render();}catch(e){}
  } else {
    localStorage.setItem('netiva_cache_ts',String(Date.now()));
  // Set flag so snapshot callbacks that fire during listener registration
  // (Supabase fires onSnapshot immediately with the current value) don't
  // trigger extra re-renders while we're still loading everything.
  _bootImgFetchInProgress=true;
  (async()=>{
    try{
      // Fetch hero image doc
      const heroRef=_fb.doc(_fb.fsdb,'netiva','hero');
      const heroSnap=await _fb.getDoc(heroRef);
      if(heroSnap.exists()) _applyHeroDoc(heroSnap.data());

      // Fetch per-product image docs
      await Promise.all((db.products||[]).map(async prod=>{
        try{
          const ref=_fb.doc(_fb.fsdb,'netiva','img_'+prod.id);
          const snap=await _fb.getDoc(ref);
          if(snap.exists()) _applyProdImgDoc(prod.id, snap.data());
        }catch(e){ console.warn('img read failed for '+prod.id,e); }
      }));

      // Fetch per-product extended text docs
      await Promise.all((db.products||[]).map(async prod=>{
        try{
          const ref=_fb.doc(_fb.fsdb,'netiva','text_'+prod.id);
          const snap=await _fb.getDoc(ref);
          if(snap.exists()) _applyProdTextDoc(prod.id, snap.data());
        }catch(e){ console.warn('text read failed for '+prod.id,e); }
      }));

      // Fetch per-referrer QR docs
      await Promise.all((db.referrers||[]).map(async ref=>{
        try{
          const docRef=_fb.doc(_fb.fsdb,'netiva','ref_'+ref.id);
          const snap=await _fb.getDoc(docRef);
          if(snap.exists()) _applyRefDoc(ref.id, snap.data());
        }catch(e){ console.warn('ref img read failed for '+ref.id,e); }
      }));

      // Also try old shopimages doc for migration (in case data is still there)
      try{
        const oldRef=_fb.doc(_fb.fsdb,'netiva','shopimages');
        const oldSnap=await _fb.getDoc(oldRef);
        if(oldSnap.exists()) _applyImgPayload(oldSnap.data());
      }catch(e){}

      // Cache all images locally
      try{localStorage.setItem(IMG_DOC_KEY, JSON.stringify(_buildLocalImgCache()));}catch(e){}
      // Clear the boot flag before the final render so snapshot callbacks can
      // trigger renders normally from this point on.
      _bootImgFetchInProgress=false;
      // Always re-render after images/text have loaded so they appear for everyone
      try{render();}catch(e){}
    }catch(e){ _bootImgFetchInProgress=false; console.warn('Supabase image read failed:',e); }
  })();
  } // end cache-TTL else

  // ── Live listeners (admin only — regular shoppers don't need realtime) ────
  if(db.adm){
    try{
      _fb.onSnapshot(_fb.storeDoc, (snap)=>{
        if(!snap.exists()) return;
        _applyRemote(snap.data());
        _debouncedRender();
      });
    }catch(e){ console.warn('Supabase main listener failed:',e); }

    // Live listener for hero image
    try{
      const heroRef=_fb.doc(_fb.fsdb,'netiva','hero');
      _fb.onSnapshot(heroRef,(snap)=>{
        if(!snap.exists()) return;
        _applyHeroDoc(snap.data());
        try{localStorage.setItem(IMG_DOC_KEY,JSON.stringify(_buildLocalImgCache()));}catch(e){}
        // Skip re-render if we just wrote this ourselves (admin slide edit) — DOM is already patched
        if(window._suppressNextHeroRender){ window._suppressNextHeroRender=false; return; }
        _debouncedRender();
      });
    }catch(e){ console.warn('Supabase hero listener failed:',e); }

    // Live listeners for each product image/text doc (uses dedup helper)
    (db.products||[]).forEach(prod=>{ _attachProdListeners(prod); });

    // Live listeners for each referrer QR doc (uses dedup helper)
    (db.referrers||[]).forEach(ref=>{ _attachRefListener(ref); });
  }
}

// Wait for Zeabur PostgreSQL adapter to be ready, then boot
// Safety fallback: if backend never responds (e.g. offline), boot from cache after 3s
setTimeout(()=>{
  if(!_fbReady){
    _fbReady=true;
    try{
      const cached=localStorage.getItem('netiva_shop');if(cached){const p=JSON.parse(cached);_applyRemote(p);}
      const cachedImgs=localStorage.getItem(IMG_DOC_KEY);if(cachedImgs){_applyImgPayload(JSON.parse(cachedImgs));}
    }catch(e){}
    go('shop');
  }
}, 3000);

async function fetchRate(){
  const dot=document.getElementById('rdot'),lbl=document.getElementById('rlbl');
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/USD');
    const d=await r.json();
    if(d.result==='success'&&d.rates?.CNY){
      rate=d.rates.CNY;
      const ts=new Date(d.time_last_update_utc).toLocaleString('zh-CN',{timeZone:'Asia/Shanghai',hour:'2-digit',minute:'2-digit',month:'numeric',day:'numeric'});
      if(dot){dot.classList.remove('loading');dot.className='rate-dot live';}
      if(lbl)lbl.textContent='1 USD = ¥'+rate.toFixed(4)+' · '+ts;
      document.querySelectorAll('[data-usd]').forEach(el=>el.textContent=cny(parseFloat(el.dataset.usd)));
    }else throw 0;
  }catch(e){
    try{const r2=await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');const d2=await r2.json();rate=d2.usd.cny;if(dot)dot.classList.remove('loading');if(lbl)lbl.textContent='1 USD = ¥'+rate.toFixed(4);document.querySelectorAll('[data-usd]').forEach(el=>el.textContent=cny(parseFloat(el.dataset.usd)));}
    catch(e2){rate=7.25;if(dot)dot.classList.remove('loading');if(lbl)lbl.textContent='1 USD = ¥'+rate.toFixed(4)+' (ref.)';}
  }
}

// ── Hero carousel state & logic ──────────────────────────────────────────
let _heroIdx=0, _heroTotal=3, _heroTimer=null;

function _initHeroCarousel(){
  _heroIdx=0;
  _heroTotal=document.querySelectorAll('.hero-slide').length||3;
  clearInterval(_heroTimer);
  _heroTimer=setInterval(()=>heroStep(1),8000);
  // touch/swipe support
  const track=document.getElementById('hero-track');
  if(!track) return;
  let startX=0;
  track.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;},{passive:true});
  track.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-startX;
    if(Math.abs(dx)>40) heroStep(dx<0?1:-1);
  },{passive:true});
  // Scroll-based nav transition: off-white over hero → black over products
  _initNavScrollWatch();
}

function _initNavScrollWatch(){
  // Hero is now light — no transparent nav needed; remove any lingering handler
  window.removeEventListener('scroll',window._navScrollHandler);
}

function heroGo(idx){
  _heroIdx=idx;
  const track=document.getElementById('hero-track');
  if(track) track.style.transform=`translateX(-${_heroIdx*(100/_heroTotal)}%)`;
  document.querySelectorAll('.hero-dot').forEach((d,i)=>d.classList.toggle('on',i===_heroIdx));
  clearInterval(_heroTimer);
  _heroTimer=setInterval(()=>heroStep(1),8000);
}

function heroStep(dir){
  heroGo((_heroIdx+dir+_heroTotal)%_heroTotal);
}
// ── Per-slide hero edit ───────────────────────────────────────────────────
let _editingSlideIdx=null;

function _populateSlideTextFields(){
  const tl=window._slideTextLang||'en';
  const dw=document.getElementById('slide-edit-drawer');
  const hEl=document.getElementById('slide-edit-heading');
  const sEl=document.getElementById('slide-edit-sub');
  const lbl=document.getElementById('slide-txt-lang-label');
  if(!dw||!hEl||!sEl) return;
  if(tl==='zh'){ hEl.value=dw._txtzh||''; sEl.value=dw._subzh||''; if(lbl)lbl.textContent='(简体中文)'; }
  else if(tl==='zht'){ hEl.value=dw._txtzht||''; sEl.value=dw._subzht||''; if(lbl)lbl.textContent='(繁體中文)'; }
  else { hEl.value=dw._txten||''; sEl.value=dw._suben||''; if(lbl)lbl.textContent='(English)'; }
  // Update tab button styles
  ['en','zh','zht'].forEach(l=>{
    const btn=document.getElementById('stxt-'+l);
    if(!btn) return;
    const on=l===tl;
    btn.style.background=on?'#1c1a16':'transparent';
    btn.style.color=on?'#faf8f4':'#6b6355';
  });
  updateSlidePreview();
}
function switchTextLang(tl){

async function handleSlideImg(e){

  const _setMsg=(html)=>{ const el=document.getElementById('slide-edit-msg'); if(el) el.innerHTML=html; };

  // Read file directly as base64 — no compression, full original quality
  let url='';
  try{
    url = await new Promise((resolve, reject)=>{
      const reader=new FileReader();
      reader.onload=(ev)=>resolve(ev.target.result);
      reader.onerror=reject;
      reader.readAsDataURL(f);
    });
  }catch(err){
    _setMsg('<div class="m e" style="font-size:12px">⚠️ Could not read image.</div>');

  }

const _heroCropState={};
function openHeroCropTool(slideIdx){
  const area=document.getElementById('slide-hero-crop-area');
  if(!area) return;
  const url=(db.heroSlides&&db.heroSlides[slideIdx]&&db.heroSlides[slideIdx].img)||'';

  const key='hero'+slideIdx;

  if(!_heroCropState[key]){
    _heroCropState[key]={scale:saved.cropScale||1,ox:saved.cropX||0,oy:saved.cropY||0,dragging:false,sx:0,sy:0};
  }
  area.innerHTML=`
    <div style="background:#111;border-radius:8px;overflow:hidden;margin-bottom:8px;cursor:grab;user-select:none;position:relative;height:200px" id="hcc-${key}">
      <canvas id="hcv-${key}" style="display:block;width:100%;height:200px"></canvas>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
      <span style="font-size:11px;color:#6b6355">Zoom</span>
      <input type="range" id="hcz-${key}" min="0.5" max="4" step="0.01" value="${_heroCropState[key].scale}" oninput="heroCropZoom('${key}',${slideIdx},this.value)" style="flex:1;min-width:80px">
      <button class="btn sm" onclick="heroCropReset('${key}',${slideIdx})">Reset</button>
      <button class="btn sm" onclick="applyHeroCrop('${key}',${slideIdx})">Apply</button>
      <button class="btn sm d" onclick="document.getElementById('slide-hero-crop-area').innerHTML=''">Close</button>
    </div>
    <div style="font-size:11px;color:#a39c8f;margin-bottom:8px">Drag to reposition · Zoom to scale · Click Apply to save</div>`;
  const cc=document.getElementById('hcc-'+key);
  const canvas=document.getElementById('hcv-'+key);
  // Set canvas resolution
  canvas.width=460; canvas.height=200;
  const img=new Image();
  img.onload=()=>{
    _heroCropState[key].img=img;
    _drawHeroCrop(key);
    // Mouse drag
    cc.onmousedown=e=>{_heroCropState[key].dragging=true;_heroCropState[key].sx=e.clientX-_heroCropState[key].ox;_heroCropState[key].sy=e.clientY-_heroCropState[key].oy;e.preventDefault();cc.style.cursor='grabbing';};
    window.addEventListener('mousemove',function _hcmm(e){if(!_heroCropState[key]||!_heroCropState[key].dragging)return;_heroCropState[key].ox=e.clientX-_heroCropState[key].sx;_heroCropState[key].oy=e.clientY-_heroCropState[key].sy;_drawHeroCrop(key);});
    window.addEventListener('mouseup',()=>{if(_heroCropState[key])_heroCropState[key].dragging=false;if(cc)cc.style.cursor='grab';});
    // Touch
    cc.ontouchstart=e=>{_heroCropState[key].dragging=true;_heroCropState[key].sx=e.touches[0].clientX-_heroCropState[key].ox;_heroCropState[key].sy=e.touches[0].clientY-_heroCropState[key].oy;};
    cc.ontouchmove=e=>{if(!_heroCropState[key].dragging)return;_heroCropState[key].ox=e.touches[0].clientX-_heroCropState[key].sx;_heroCropState[key].oy=e.touches[0].clientY-_heroCropState[key].sy;_drawHeroCrop(key);e.preventDefault();};
    cc.ontouchend=()=>{_heroCropState[key].dragging=false;};
  };
  img.src=url;
}
function _drawHeroCrop(key){
  const canvas=document.getElementById('hcv-'+key);
  if(!canvas) return;
  const s=_heroCropState[key];
  if(!s||!s.img) return;
  const cw=canvas.width, ch=canvas.height;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,cw,ch);
  const iw=s.img.naturalWidth, ih=s.img.naturalHeight;
  // Base scale so image covers the canvas
  const baseScale=Math.max(cw/iw, ch/ih);
  const drawW=iw*baseScale*s.scale, drawH=ih*baseScale*s.scale;
  const cx=cw/2+s.ox, cy=ch/2+s.oy;
  ctx.drawImage(s.img, cx-drawW/2, cy-drawH/2, drawW, drawH);
}
function heroCropZoom(key,slideIdx,val){
  _heroCropState[key].scale=parseFloat(val);
  _drawHeroCrop(key);
}
function heroCropReset(key,slideIdx){
  _heroCropState[key].scale=1;_heroCropState[key].ox=0;_heroCropState[key].oy=0;
  const zEl=document.getElementById('hcz-'+key);if(zEl)zEl.value=1;
  _drawHeroCrop(key);
}
function applyHeroCrop(key,slideIdx){
  const s=_heroCropState[key];
  if(!s||slideIdx===null||slideIdx===undefined) return;
  if(!db.heroSlides) db.heroSlides=[{},{},{}];
  if(!db.heroSlides[slideIdx]) db.heroSlides[slideIdx]={};
  db.heroSlides[slideIdx].cropScale=s.scale;
  db.heroSlides[slideIdx].cropX=s.ox;
  db.heroSlides[slideIdx].cropY=s.oy;
  // Apply to live slide background using object-position
  _applyHeroCropToSlide(slideIdx);
  window._suppressNextHeroRender=true;
  sv(true);
  const area=document.getElementById('slide-hero-crop-area');
  if(area){
    const oldInner=area.innerHTML;
    area.insertAdjacentHTML('afterbegin','<div class="m s" style="font-size:12px;margin-bottom:6px">✓ Crop applied!</div>');
    setTimeout(()=>{const msg=area.querySelector('.m.s');if(msg)msg.remove();},1500);
  }
}
function _applyHeroCropToSlide(slideIdx){
  const s=db.heroSlides&&db.heroSlides[slideIdx];
  if(!s) return;
  const slides=document.querySelectorAll('.hero-slide');
  const sl=slides[slideIdx];
  if(!sl) return;
  const bg=sl.querySelector('.hero-slide-bg');
  if(!bg||!bg.src) return;
  // Convert canvas offset to CSS object-position percentage
  // ox/oy are pixel offsets from center in the 460×200 canvas; map to %
  const cw=460,ch=200;
  const scale=s.cropScale||1;
  // object-position: x% y%
  // center = 50% 50%; ox shifts x, oy shifts y
  const pctX=50 - (s.cropX||0)/cw*100/scale;
  const pctY=50 - (s.cropY||0)/ch*100/scale;
  bg.style.objectFit='cover';
  bg.style.objectPosition=`${Math.max(0,Math.min(100,pctX)).toFixed(1)}% ${Math.max(0,Math.min(100,pctY)).toFixed(1)}%`;
  bg.style.transform=`scale(${scale})`;
  bg.style.transformOrigin='center center';
}

let cardImgIdx={};
function getAllImgs(p){

}
function cardSlide(pid,val,isRelative){

function rteCmd(id, cmd){
  const el = document.getElementById(id);
  if(!el) return;
  el.focus();
  if(cmd === 'heading'){
    // Toggle h3 / p
    const sel = window.getSelection();
    if(sel && sel.rangeCount){
      let node = sel.anchorNode;
      while(node && node !== el){
        if(node.nodeName === 'H3'){ document.execCommand('formatBlock',false,'p'); return; }
        node = node.parentNode;
      }
    }
    document.execCommand('formatBlock', false, 'h3');
  } else {
    document.execCommand(cmd, false, null);
  }
}
function getRteHtml(id){
  const el = document.getElementById(id);
  if(!el) return '';
  const html = el.innerHTML.trim();
  if(html === '<br>' || html === '') return '';
  return html;
}
