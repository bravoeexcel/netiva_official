/* ── Image crop / pan / zoom tool ── */
const cropState={};
function openCropTool(pfx,imgIdx){
  const imgs=window[pfx+'imgs'];if(!imgs||!imgs[imgIdx])return;
  const area=document.getElementById(pfx+'crop-tool-area');if(!area)return;
  const key=pfx+imgIdx;
  if(!cropState[key])cropState[key]={scale:1,ox:0,oy:0,dragging:false,sx:0,sy:0};
  area.innerHTML=`
    <div style="background:var(--color-background-primary);border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:12px;margin-top:4px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:12px;font-weight:500">${lang==='en'?'Edit Image — drag to pan, slider to zoom':'编辑图片 — 拖动平移，滑块缩放'}</div>
        <button class="btn sm" onclick="applyImgCrop('${pfx}',${imgIdx})" style="background:var(--color-text-primary);color:#fff;border-color:transparent">${lang==='en'?'Apply Crop':'应用裁切'}</button>
      </div>
      <div class="crop-container" id="${key}-cc" style="height:260px">
        <canvas id="${key}-cv" class="crop-canvas" style="height:260px;width:100%"></canvas>
      </div>
      <div class="crop-controls">
        <label>${lang==='en'?'Zoom':'缩放'}</label>
        <input type="range" id="${key}-zoom" min="0.5" max="4" step="0.01" value="${cropState[key].scale}" oninput="cropZoom('${pfx}',${imgIdx},this.value)">
        <button class="btn sm" onclick="cropReset('${pfx}',${imgIdx})">${lang==='en'?'Reset':'重置'}</button>
        <button class="btn sm d" onclick="document.getElementById('${pfx}crop-tool-area').innerHTML=''">${lang==='en'?'Close':'关闭'}</button>
      </div>
    </div>`;
  const cc=document.getElementById(key+'-cc');
  const cv=document.getElementById(key+'-cv');
  const img=new Image();
  img.onload=()=>{
    cropState[key].img=img;
    cv.width=cc.offsetWidth;cv.height=260;
    if(!cropState[key].initialized){cropState[key].ox=0;cropState[key].oy=0;cropState[key].scale=1;cropState[key].initialized=true;}
    drawCrop(key);
    // Drag to pan
    cc.onmousedown=e=>{cropState[key].dragging=true;cropState[key].sx=e.clientX-cropState[key].ox;cropState[key].sy=e.clientY-cropState[key].oy;e.preventDefault();};
    cc.ontouchstart=e=>{cropState[key].dragging=true;cropState[key].sx=e.touches[0].clientX-cropState[key].ox;cropState[key].sy=e.touches[0].clientY-cropState[key].oy;};
    window.addEventListener('mousemove',function mm(e){if(!cropState[key].dragging)return;cropState[key].ox=e.clientX-cropState[key].sx;cropState[key].oy=e.clientY-cropState[key].sy;drawCrop(key);});
    window.addEventListener('mouseup',()=>{cropState[key].dragging=false;});
    cc.ontouchmove=e=>{if(!cropState[key].dragging)return;cropState[key].ox=e.touches[0].clientX-cropState[key].sx;cropState[key].oy=e.touches[0].clientY-cropState[key].sy;drawCrop(key);e.preventDefault();};
    cc.ontouchend=()=>{cropState[key].dragging=false;};
  };
  img.src=imgs[imgIdx];
}
function drawCrop(key){
  const s=cropState[key];if(!s||!s.img)return;
  const cv=document.getElementById(key+'-cv');if(!cv)return;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  const iw=s.img.naturalWidth,ih=s.img.naturalHeight;
  const baseScale=Math.max(cv.width/iw,cv.height/ih);
  const sc=baseScale*s.scale;
  const dw=iw*sc,dh=ih*sc;
  const cx=cv.width/2+s.ox,cy=cv.height/2+s.oy;
  ctx.drawImage(s.img,cx-dw/2,cy-dh/2,dw,dh);
}
function cropZoom(pfx,imgIdx,val){
  const key=pfx+imgIdx;
  cropState[key].scale=parseFloat(val);
  drawCrop(key);
}
function cropReset(pfx,imgIdx){
  const key=pfx+imgIdx;
  cropState[key].scale=1;cropState[key].ox=0;cropState[key].oy=0;
  const zoomEl=document.getElementById(key+'-zoom');if(zoomEl)zoomEl.value=1;
  drawCrop(key);
}
function applyImgCrop(pfx,imgIdx){
  const key=pfx+imgIdx;const s=cropState[key];if(!s||!s.img)return;
  const cv=document.getElementById(key+'-cv');if(!cv)return;
  // Render to an offscreen canvas at display size
  const oc=document.createElement('canvas');oc.width=cv.width;oc.height=cv.height;
  const octx=oc.getContext('2d');
  const iw=s.img.naturalWidth,ih=s.img.naturalHeight;
  const baseScale=Math.max(cv.width/iw,cv.height/ih);
  const sc=baseScale*s.scale;
  const dw=iw*sc,dh=ih*sc;
  const cx=oc.width/2+s.ox,cy=oc.height/2+s.oy;
  octx.drawImage(s.img,cx-dw/2,cy-dh/2,dw,dh);
  const dataUrl=oc.toDataURL('image/jpeg',0.92);
  window[pfx+'imgs'][imgIdx]=dataUrl;
  cropState[key].initialized=false;
  // Refresh gallery & close tool
  const galleryEl=document.getElementById(pfx+'img-gallery');
  if(galleryEl){
    const imgs=window[pfx+'imgs'];
    galleryEl.innerHTML=imgs.map((src,i)=>`<div style="position:relative;display:inline-block"><img src="${src}" style="width:72px;height:72px;object-fit:cover;border-radius:6px;border:.5px solid var(--color-border-secondary);cursor:pointer" onclick="openCropTool('${pfx}',${i})"><button onclick="removeProdImg('${pfx}',${i})" style="position:absolute;top:-5px;right:-5px;background:#E24B4A;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1">×</button><div style="font-size:10px;text-align:center;color:var(--color-text-secondary);margin-top:3px">${lang==='en'?'Edit':'编辑'}</div></div>`).join('');
  }
  const area=document.getElementById(pfx+'crop-tool-area');if(area)area.innerHTML=`<div class="m s" style="font-size:12px">${lang==='en'?'Crop applied!':'裁切已应用！'}</div>`;
  setTimeout(()=>{const a=document.getElementById(pfx+'crop-tool-area');if(a)a.innerHTML='';},1500);
}
function removeProdImg(pfx,idx){
  const imgs=window[pfx+'imgs'];if(!imgs)return;
  imgs.splice(idx,1);
  const gallery=document.getElementById(pfx+'img-gallery');
  if(gallery){gallery.innerHTML=imgs.map((src,i)=>`<div style="position:relative;display:inline-block"><img src="${src}" style="width:72px;height:72px;object-fit:cover;border-radius:6px;border:.5px solid var(--color-border-secondary);cursor:pointer" onclick="openCropTool('${pfx}',${i})"><button onclick="removeProdImg('${pfx}',${i})" style="position:absolute;top:-5px;right:-5px;background:#E24B4A;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1">×</button><div style="font-size:10px;text-align:center;color:var(--color-text-secondary);margin-top:3px">${lang==='en'?'Edit':'编辑'}</div></div>`).join('');}else{rAdmProds(document.getElementById('atc'));}
}
function addVar(pfx){
  if(!window[pfx+'variants'])window[pfx+'variants']=[];
  window[pfx+'variants'].push({id:'v'+Date.now(),name_en:'',name_zh:'',priceDelta:0});
  // re-render the vlist inline
  const list=document.getElementById(pfx+'vlist');if(!list)return;
  const vs=window[pfx+'variants'];
  const i=vs.length-1;
  const row=document.createElement('div');row.className='var-row';row.id=pfx+'vrow-'+i;
  row.innerHTML=`<input type="text" id="${pfx}v-en-${i}" value="" placeholder="EN name" style="min-width:60px"><input type="text" id="${pfx}v-zh-${i}" value="" placeholder="中文名称" style="min-width:60px"><input type="number" id="${pfx}v-pd-${i}" value="0" placeholder="+price" step="0.01" style="width:70px"><button class="btn sm d" style="flex-shrink:0;padding:3px 8px" onclick="rmVar('${pfx}',${i})">×</button>`;
  list.appendChild(row);
}
function rmVar(pfx,idx){
  // read current values before removing
  collectVarFields(pfx);
  window[pfx+'variants'].splice(idx,1);
  // re-render vlist
  const list=document.getElementById(pfx+'vlist');if(!list)return;
  const vs=window[pfx+'variants'];
  list.innerHTML=vs.map((v2,i)=>`<div class="var-row" id="${pfx}vrow-${i}"><input type="text" id="${pfx}v-en-${i}" value="${v2.name_en||''}" placeholder="EN name" style="min-width:60px"><input type="text" id="${pfx}v-zh-${i}" value="${v2.name_zh||''}" placeholder="中文名称" style="min-width:60px"><input type="number" id="${pfx}v-pd-${i}" value="${v2.priceDelta||0}" placeholder="+price" step="0.01" style="width:70px"><button class="btn sm d" style="flex-shrink:0;padding:3px 8px" onclick="rmVar('${pfx}',${i})">×</button></div>`).join('');
}
function collectVarFields(pfx){
  const vs=window[pfx+'variants']||[];
  vs.forEach((v2,i)=>{
    const en=document.getElementById(pfx+'v-en-'+i);const zh=document.getElementById(pfx+'v-zh-'+i);const pd=document.getElementById(pfx+'v-pd-'+i);
    if(en)v2.name_en=en.value.trim();if(zh)v2.name_zh=zh.value.trim();if(pd)v2.priceDelta=parseFloat(pd.value)||0;
  });
  // filter out completely blank rows
  window[pfx+'variants']=vs.filter(v2=>v2.name_en||v2.name_zh);
  return window[pfx+'variants'];
}

async function handleProdImgs(e,pfx){
  const files=Array.from(e.target.files);if(!files.length)return;
  if(!window[pfx+'imgs'])window[pfx+'imgs']=[];
  const gallery=document.getElementById(pfx+'img-gallery');
  // Show uploading indicator
  const uploadingDiv=document.createElement('div');uploadingDiv.id=pfx+'uploading';uploadingDiv.style.cssText='font-size:12px;color:var(--color-text-secondary);padding:6px 0';uploadingDiv.textContent=lang==='en'?'Uploading…':lang==='zht'?'上傳中…':'上传中…';if(gallery)gallery.parentNode.insertBefore(uploadingDiv,gallery.nextSibling);
  await Promise.all(files.map(async f=>{
    const path=`products/${Date.now()}_${Math.random().toString(36).slice(2)}_${f.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const{data,error}=await _fb.fsdb.storage.from('netiva').upload(path,f,{upsert:true});
    if(error){console.error('Product img upload error:',error);const ind2=document.getElementById(pfx+'uploading');if(ind2)ind2.remove();alert('Image upload failed: '+error.message+' — Check that the server is running and accessible.');return;}
    const url=_fb.fsdb.storage.from('netiva').getPublicUrl(data.path).data.publicUrl;
    window[pfx+'imgs'].push(url);
  }));
  const ind=document.getElementById(pfx+'uploading');if(ind)ind.remove();
  if(gallery){
    const imgs=window[pfx+'imgs'];
    gallery.innerHTML=imgs.map((src,i)=>`<div style="position:relative;display:inline-block">
      <img src="${src}" style="width:72px;height:72px;object-fit:cover;border-radius:6px;border:.5px solid var(--color-border-secondary);cursor:pointer" onclick="openCropTool('${pfx}',${i})">
      <button onclick="removeProdImg('${pfx}',${i})" style="position:absolute;top:-5px;right:-5px;background:#E24B4A;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1">×</button>
      <div style="font-size:10px;text-align:center;color:var(--color-text-secondary);margin-top:3px">${lang==='en'?'Edit':'编辑'}</div>
    </div>`).join('');
  } else {
    rAdmProds(document.getElementById('atc'));

function toggleCatEdit(id){
  const view=document.getElementById('cat-view-'+id);
  const edit=document.getElementById('cat-edit-'+id);
  const editBtn=document.getElementById('cat-edit-btn-'+id);
  const saveBtn=document.getElementById('cat-save-btn-'+id);

function saveCatEdit(id){
  const cat=db.categories.find(c=>c.id===id);if(!cat)return;
  const en=document.getElementById('ce-en-'+id)?.value.trim();
  if(!en){const m=document.getElementById('cats-msg');if(m)m.innerHTML=`<div class="m e" style="margin-bottom:8px">${lang==='en'?'English name required':'请填写英文名称'}</div>`;return;}

  cat.label_zh=document.getElementById('ce-zh-'+id)?.value.trim()||en;
  cat.label_zht=document.getElementById('ce-zht-'+id)?.value.trim()||en;
  sv(true);rAdmCats(document.getElementById('atc'));
}

function addCat(){
  const en=document.getElementById('new-cat-en')?.value.trim();
  const zh=document.getElementById('new-cat-zh')?.value.trim();
  const zht=document.getElementById('new-cat-zht')?.value.trim();
  const msg=document.getElementById('cats-msg');
  if(!en){if(msg)msg.innerHTML=`<div class="m e" style="margin-bottom:8px">${lang==='en'?'English name required':'请填写英文名称'}</div>`;return;}
  if(!db.categories)db.categories=[];
  const maxOrder=Math.max(0,...db.categories.map(c=>c.order||0));
  db.categories.push({id:'cat-'+Date.now(),label_en:en,label_zh:zh||en,label_zht:zht||en,order:maxOrder+1});
  sv(true);rAdmCats(document.getElementById('atc'));
}

function deleteCat(id){
  const cnt=db.products.filter(p=>p.categoryId===id).length;
  if(cnt>0){
    if(!confirm((lang==='en'?`Delete this category? ${cnt} product(s) will become uncategorised.`:`删除此分类？${cnt} 个商品将变为未分类。`)))return;
    db.products.forEach(p=>{if(p.categoryId===id)p.categoryId='';});
  }
  db.categories=db.categories.filter(c=>c.id!==id);
  sv(true);rAdmCats(document.getElementById('atc'));
}

function moveCat(id,dir){
  if(!db.categories)return;
  const cats=db.categories.filter(c=>c.id!=='cat-all').sort((a,b)=>(a.order||0)-(b.order||0));
  const idx=cats.findIndex(c=>c.id===id);if(idx<0)return;
  const swapIdx=idx+dir;if(swapIdx<0||swapIdx>=cats.length)return;
  const tmp=cats[idx].order;cats[idx].order=cats[swapIdx].order;cats[swapIdx].order=tmp;
  sv(true);rAdmCats(document.getElementById('atc'));
}

function delRef(id){const cnt=membersByRef(id).length;if(cnt>0){const tc=document.getElementById('atc');const d=document.createElement('div');d.className='m e';d.style.marginBottom='10px';d.textContent=t('errorDeleteReferrer');tc.prepend(d);setTimeout(()=>d.remove(),3000);return;}db.referrers=db.referrers.filter(x=>x.id!==id);sv(true);editingRefId=null;rAdmRefs(document.getElementById('atc'));}
function rAdmMem(tc){tc.innerHTML=`<div style="overflow-x:auto"><table><thead><tr><th>${t('memberName')}</th><th>${t('email')}</th><th>${t('referrer')}</th><th>${t('referralCode')}</th><th>${t('regDate')}</th><th>${t('orders')}</th></tr></thead><tbody>${db.users.length===0?`<tr><td colspan="6" style="text-align:center;color:var(--color-text-secondary);padding:2rem">${t('noMembers')}</td></tr>`:db.users.map(u=>`<tr><td><div style="display:flex;align-items:center;gap:8px"><div class="ava" style="width:28px;height:28px;font-size:16px">${ava(u)}</div><span style="font-weight:500">${u.name}</span></div></td><td style="color:var(--color-text-secondary)">${u.email}</td><td><span class="bdg a">${u.referrerName}</span></td><td><span class="code">${refById(u.referrerId)?.code||'—'}</span></td><td style="color:var(--color-text-secondary)">${u.joined}</td><td>${u.orders||0}</td></tr>`).join('')}</tbody></table></div>`;}

function rAdmSettings(tc){const heroSlidesData=db.heroSlides||[{},{},{}];const slideNames=[['Mushroom','🍄','brown','#5c3418'],['Rose','🌹','red','#7a1a0a'],['Garden','🌿','green','#1e4a10']];tc.innerHTML=`<div style="max-width:600px">
<div style="background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.5rem;margin-bottom:1rem">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <div style="font-size:15px;font-weight:600">${lang==='en'?'Hero Banner Slides':'首页横幅'}</div>
    <span style="font-size:11px;color:var(--color-text-tertiary);background:var(--color-background-secondary);padding:2px 8px;border-radius:999px;border:.5px solid var(--color-border-tertiary)">${lang==='en'?'3 slides':'3张幻灯片'}</span>
  </div>
  <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:1.25rem">${lang==='en'?'Click any slide to edit its image, headline, subheadline and Chinese text.':'点击任意幻灯片以编辑图片、标题、副标题和中文文字。'}</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px">
    ${slideNames.map(([name,icon,theme,color],i)=>{
      const s=heroSlidesData[i]||{};
      const THUMB_BG={brown:'linear-gradient(160deg,#6b4020,#1e0e04)',red:'linear-gradient(160deg,#8c1a0c,#2e0404)',green:'linear-gradient(160deg,#2a5a14,#081804)'};
      const _lk=lang==='zht'?'zht':lang==='zh'?'zh':'en';const title=s['title_'+_lk]||s.title_en||s.title||(i===0?'Fresh from the source':i===1?'Finest Ingredients':'Wild & Natural');
      const hasImg=!!(s.img);
      return `<div onclick="openSlideEdit(${i})" style="border:.5px solid var(--color-border-secondary);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .15s;position:relative" onmouseover="this.style.borderColor='var(--color-accent)';this.style.boxShadow='0 4px 16px rgba(0,0,0,.1)'" onmouseout="this.style.borderColor='var(--color-border-secondary)';this.style.boxShadow=''">
        <div style="height:80px;background:${THUMB_BG[theme]};position:relative;display:flex;align-items:flex-end;padding:8px">
          ${hasImg?`<img src="${s.img}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.35">`:``}
          <div style="position:absolute;inset:0;background:${THUMB_BG[theme].replace('linear-gradient','linear-gradient').replace(')',',rgba(0,0,0,0.2))')}"></div>
          <div style="position:relative;z-index:1;font-size:9px;color:rgba(255,255,255,.9);font-weight:600;line-height:1.3;text-shadow:0 1px 3px rgba(0,0,0,.5);overflow:hidden;max-height:28px">${title}</div>
          ${hasImg?`<div style="position:absolute;top:5px;right:5px;background:rgba(0,0,0,.45);border-radius:4px;padding:1px 5px;font-size:9px;color:#fff;z-index:2">📷</div>`:`<div style="position:absolute;top:5px;right:5px;background:rgba(255,255,255,.15);border-radius:4px;padding:1px 5px;font-size:9px;color:rgba(255,255,255,.7);z-index:2">No img</div>`}
        </div>
        <div style="padding:8px 10px;background:var(--color-background-primary)">
          <div style="display:flex;align-items:center;gap:5px">
            <span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0"></span>
            <span style="font-size:12px;font-weight:500">${icon} ${name}</span>
          </div>
          <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:2px">${s.zh_main||'—'} · ${s.zh_tag||'—'}</div>
        </div>
      </div>`;
    }).join('')}
  </div>
  <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:8px">💡 ${lang==='en'?'Images sit behind the colour gradient. Upload a food photo for a richer look.':'图片显示在颜色渐变下方，上传食物照片可获得更丰富的视觉效果。'}</div>
</div>
<div style="background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.5rem;margin-bottom:1rem"><div style="font-size:15px;font-weight:500;margin-bottom:1rem">${t('adminCredentials')}</div><div id="stg-msg"></div><div class="fl"><label>${t('newEmail')}</label><input type="email" id="stg-email" value="${db.adminEmail||''}" placeholder="${t('adminEmailPlaceholder')}"></div><div class="dv"></div><div class="fl"><label>${t('currentPassword')}</label><input type="password" id="stg-cur-pw" placeholder="••••••••"></div><div class="fl"><label>${t('newPassword')} <span style="font-size:11px;color:var(--color-text-tertiary)">(${lang==='en'?'leave blank to keep current':lang==='zht'?'留空保持不變':'留空保持不变'})</span></label><input type="password" id="stg-new-pw" placeholder="••••••••" oninput="ckAS2(this.value)"><div class="sb" id="stg-sb" style="width:0%;background:#E24B4A"></div></div><div class="fl"><label>${t('confirmPassword')}</label><input type="password" id="stg-new-pw2" placeholder="••••••••"></div><button class="btn p" style="margin-top:8px" onclick="saveAdminSettings()">${t('saveCredentials')}</button></div></div>`;}function ckAS2(pw){const b=document.getElementById('stg-sb');if(!b)return;if(!pw){b.style.width='0%';return;}let s=0;if(pw.length>=8)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;b.style.width=['0%','25%','50%','75%','100%'][s];b.style.background=['#E24B4A','#E24B4A','#EF9F27','#97C459','#639922'][s];}
function saveAdminSettings(){const em=document.getElementById('stg-email').value.trim().toLowerCase(),cur=document.getElementById('stg-cur-pw').value,npw=document.getElementById('stg-new-pw').value,npw2=document.getElementById('stg-new-pw2').value,msg=document.getElementById('stg-msg');if(cur!==db.adminPassword){msg.innerHTML=`<div class="m e">${t('errorCurrentPassword')}</div>`;return;}if(!em){msg.innerHTML=`<div class="m e">${t('errorEmailRequired')}</div>`;return;}if(npw&&npw.length<8){msg.innerHTML=`<div class="m e">${t('errorPassShort')}</div>`;return;}if(npw&&npw!==npw2){msg.innerHTML=`<div class="m e">${t('errorPassMismatch')}</div>`;return;}db.adminEmail=em;if(npw)db.adminPassword=npw;sv(true);msg.innerHTML=`<div class="m s">${t('credentialsSaved')}</div>`;document.getElementById('stg-cur-pw').value='';document.getElementById('stg-new-pw').value='';document.getElementById('stg-new-pw2').value='';if(document.getElementById('stg-sb'))document.getElementById('stg-sb').style.width='0%';}

function toggleFeeEdit(){const ed=document.getElementById('fee-edit'),disp=document.getElementById('fee-display');if(!ed||!disp)return;const isOpen=ed.style.display==='block';ed.style.display=isOpen?'none':'block';if(!isOpen){document.getElementById('fee-input').value=(FEE_RATE*100).toFixed(4).replace(/\.?0+$/,'');document.getElementById('fee-input').focus();}}
function saveFeeRate(){const inp=document.getElementById('fee-input'),msg=document.getElementById('fee-msg');const v=parseFloat(inp.value);if(isNaN(v)||v<0||v>100){msg.innerHTML=`<div class="m e" style="font-size:11px;padding:4px 8px">${lang==='en'?'Enter 0–100':(lang==='zht'?'請輸入 0–100':'请输入 0–100')}</div>`;return;}FEE_RATE=parseFloat((v/100).toFixed(6));sv(true);document.getElementById('fee-display').textContent=(v).toFixed(2).replace(/\.?0+$/,'')+'%';document.getElementById('fee-edit').style.display='none';msg.innerHTML='';}

</script>
